<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة الموظفين | نظام إدارة الحضور والانصراف والرواتب</title>
    <!-- CDN Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
    <link href="../css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Hidden element strictly telling the javascript router that this is the employees page -->
    <div id="employees-page-indicator" style="display:none"></div>

    <div class="app-wrapper">
      <!-- Dynamic Sidebar Container -->
      <div id="sidebar-container"></div>

      <!-- Main Action Wrapper -->
      <div class="main-content">
        <!-- Dynamic Header Container -->
        <div id="header-container"></div>

        <div class="content-body">
          
          <!-- Page Header Info -->
          <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
              <h3 class="fw-bold m-0 text-dark">دليل إدارة الموظفين</h3>
              <p class="text-muted m-0">تسجيل وتعديل بيانات الموظفين، تحديد رواتبهم الأساسية، إداراتهم، وأرصدة إجازاتهم السنوية.</p>
            </div>
            
            <!-- Excel Action buttons -->
            <div class="d-flex gap-2">
              <!-- Export button -->
              <button class="btn btn-outline-success d-flex align-items-center gap-2" id="export-employees">
                <i class="bi bi-file-earmark-excel"></i>
                <span>تصدير لإكسل</span>
              </button>
              
              <!-- Import button file wrapper -->
              <div class="position-relative overflow-hidden">
                <button class="btn btn-success d-flex align-items-center gap-2">
                  <i class="bi bi-file-earmark-arrow-up"></i>
                  <span>استيراد كشف إكسل</span>
                </button>
                <input type="file" id="import-employees-file" accept=".xlsx, .xls" class="position-absolute top-0 start-0 opacity-0 cursor-pointer h-100 w-100" />
              </div>

              <!-- Add Employee Modal Trigger button -->
              <button class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#employeeModal" onclick="resetEmployeeForm()">
                <i class="bi bi-person-plus-fill"></i>
                <span>إضافة موظف جديد</span>
              </button>
            </div>
          </div>

          <!-- Dynamic Filter Bar Section -->
          <div class="card p-3 custom-table-card mb-4">
            <div class="row g-3 align-items-center">
              <div class="col-md-3">
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0 text-muted">
                    <i class="bi bi-search"></i>
                  </span>
                  <input type="text" class="form-control border-start-0 shadow-none ps-0" id="search-emp" placeholder="البحث بالاسم، الرقم الوظيفي..." />
                </div>
              </div>
              <div class="col-md-3">
                <select class="form-select shadow-none" id="filter-dept">
                  <option value="">كل الأقسام</option>
                  <option value="الموارد البشرية">الموارد البشرية</option>
                  <option value="تقنية المعلومات">تقنية المعلومات</option>
                  <option value="المالية">المالية</option>
                  <option value="المبيعات">المبيعات</option>
                  <option value="العمليات">العمليات</option>
                </select>
              </div>
              <div class="col-md-3">
                <select class="form-select shadow-none" id="filter-shift">
                  <option value="">كل الورديات</option>
                  <!-- Shifts are loaded dynamically from storage.js -->
                </select>
              </div>
              <div class="col-md-3">
                <select class="form-select shadow-none" id="filter-status">
                  <option value="">كل الحالات</option>
                  <option value="نشط">نشط</option>
                  <option value="موقوف">موقوف</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Batch Actions Panel -->
          <div id="batch-actions-panel" class="card p-3 mb-3 bg-light border d-none">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div class="d-flex align-items-center gap-3">
                <span class="fw-bold text-dark">العمليات الجماعية:</span>
                <span id="selected-count-badge" class="badge bg-primary fs-6 py-2 px-3">محدد: 0 موظف</span>
              </div>
              <div class="d-flex gap-2">
                <button id="btn-select-all" class="btn btn-sm btn-outline-secondary">تحديد الكل</button>
                <button id="btn-deselect-all" class="btn btn-sm btn-outline-secondary">إلغاء التحديد</button>
                <button id="btn-delete-selected" class="btn btn-sm btn-danger">حذف المحدد</button>
              </div>
            </div>
          </div>

          <!-- Table Card -->
          <div class="card custom-table-card">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0" id="employees-table">
                <thead>
                  <tr>
                    <th style="width: 40px"><input type="checkbox" id="select-all-employees" class="form-check-input" /></th>
                    <th>ت</th>
                    <th>الرقم الوظيفي</th>
                    <th>اسم الموظف</th>
                    <th>القسم</th>
                    <th>المسمى الوظيفي</th>
                    <th>وردية العمل</th>
                    <th>الراتب الأساسي</th>
                    <th>رصيد الإجازات</th>
                    <th>الحالة</th>
                    <th>العمليات الإدارية</th>
                  </tr>
                </thead>
                <tbody id="employees-tbody">
                  <!-- Employees load dynamically from employees.js -->
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Modal Form (For adding and editing employees) -->
    <div class="modal fade" id="employeeModal" tabindex="-1" aria-labelledby="modal-emp-title" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" id="modal-emp-title">إضافة موظف جديد</h5>
            <button type="button" class="btn-close ms-0 me-auto" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="employee-form">
            <div class="modal-body p-4">
              <div class="row g-3">
                
                <!-- ID/Code -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">الرقم الوظيفي <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="emp-id" required placeholder="مثال: EMP1001" />
                </div>

                <!-- Name -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">اسم الموظف الكامل <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="emp-name" required placeholder="الاسم الثلاثي أو كاملاً..." />
                </div>

                <!-- Department -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">القسم التابع له <span class="text-danger">*</span></label>
                  <select class="form-select" id="emp-dept" required>
                    <option value="" disabled selected>اختر القسم...</option>
                    <option value="الموارد البشرية">الموارد البشرية</option>
                    <option value="تقنية المعلومات">تقنية المعلومات</option>
                    <option value="المالية">المالية</option>
                    <option value="المبيعات">المبيعات</option>
                    <option value="العمليات">العمليات</option>
                  </select>
                </div>

                <!-- Designation -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">المسمى الوظيفي <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="emp-position" required placeholder="مثال: مهندس شبكات، سكرتير..." />
                </div>

                <!-- Shift dropdown -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">وردية الدوام المعتمدة <span class="text-danger">*</span></label>
                  <select class="form-select" id="emp-shift" required>
                    <!-- Loaded dynamically from storage database -->
                  </select>
                </div>

                <!-- Basic Salary -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">الراتب الأساسي (ريال سعودي) <span class="text-danger">*</span></label>
                  <input type="number" step="0.01" class="form-control font-mono" id="emp-salary" required placeholder="مثال: 5000" />
                </div>

                <!-- Vacation balance -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">رصيد الإجازات السنوية الممنوح (أيام)</label>
                  <input type="number" class="form-control" id="emp-leaves" min="0" value="21" placeholder="مثال: 30" />
                </div>

                <!-- Status -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">الحالة الوظيفية <span class="text-danger">*</span></label>
                  <select class="form-select" id="emp-status" required>
                    <option value="نشط">نشط (مسجل حضور وبصمات ورواتب)</option>
                    <option value="موقوف">موقوف (مجمد أو مستقيل)</option>
                  </select>
                </div>

              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">إلغاء</button>
              <button type="submit" class="btn btn-primary px-4">حفظ البيانات</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Script imports -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- App logics -->
    <script type="module" src="../js/storage.js"></script>
    <script type="module" src="../js/importExport.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/employees.js"></script>
  </body>
</html>
