<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>التقارير والمقاييس | نظام إدارة الحضور والانصراف والرواتب</title>
    <!-- CDN Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
    <link href="../css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Hidden element strictly telling the javascript router that this is the reports page -->
    <div id="reports-page-indicator" style="display:none"></div>

    <div class="app-wrapper">
      <!-- Dynamic Sidebar Container -->
      <div id="sidebar-container" class="no-print"></div>

      <!-- Main Action Wrapper -->
      <div class="main-content">
        <!-- Dynamic Header Container -->
        <div id="header-container" class="no-print"></div>

        <div class="content-body">
          
          <!-- Page Header Info -->
          <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3 no-print">
            <div>
              <h3 class="fw-bold m-0 text-dark">مركز التقارير والاستعلامات</h3>
              <p class="text-muted m-0">توليد وطباعة كشوف الحضور الكلية، كشوف الغياب، دقائق التأخير، والإجازات حسب الأقسام والتاريخ.</p>
            </div>
            
            <div class="d-flex gap-2">
              <button class="btn btn-outline-dark d-flex align-items-center gap-2" id="export-report-excel">
                <i class="bi bi-file-earmark-excel"></i>
                <span>حفظ كملف إكسل</span>
              </button>
              
              <button class="btn btn-primary d-flex align-items-center gap-2" id="print-report">
                <i class="bi bi-printer"></i>
                <span>طباعة كملف PDF / ورقي</span>
              </button>
            </div>
          </div>

          <!-- Dynamic Filter Bar Section -->
          <div class="card p-3 custom-table-card mb-4 no-print">
            <div class="row g-3 align-items-center">
              
              <!-- Report Type Selector -->
              <div class="col-md-3">
                <label class="form-label fw-semibold small">نوع الكشف المطلوب:</label>
                <select class="form-select shadow-none" id="report-type">
                  <option value="attendance">كشف الحضور وساعات العمل الشهرية</option>
                  <option value="absence">كشف وحالات الغياب المفصلة</option>
                  <option value="delays">كشف دقائق ومخالفات التأخير والمغادرة</option>
                  <option value="leaves">كشف الإجازات العامة والسنوية</option>
                  <option value="payroll">كشف ميزانية وملخص الرواتب الكلي</option>
                </select>
              </div>

              <!-- Month -->
              <div class="col-md-2">
                <label class="form-label fw-semibold small">الشهر:</label>
                <select class="form-select shadow-none" id="report-month">
                  <option value="01">يناير</option>
                  <option value="02">فبراير</option>
                  <option value="03">مارس</option>
                  <option value="04">أبريل</option>
                  <option value="05">مايو</option>
                  <option value="06">يونيو</option>
                  <option value="07">يوليو</option>
                  <option value="08">أغسطس</option>
                  <option value="09">سبتمبر</option>
                  <option value="10">أكتوبر</option>
                  <option value="11">نوفمبر</option>
                  <option value="12">ديسمبر</option>
                </select>
              </div>

              <!-- Year -->
              <div class="col-md-2">
                <label class="form-label fw-semibold small">السنة:</label>
                <select class="form-select shadow-none" id="report-year">
                  <option value="2025">2025</option>
                  <option value="2026">2026</option>
                  <option value="2027">2027</option>
                  <option value="2028">2028</option>
                </select>
              </div>

              <!-- Department -->
              <div class="col-md-3">
                <label class="form-label fw-semibold small">القسم الإداري:</label>
                <select class="form-select shadow-none" id="report-dept">
                  <option value="">كل الأقسام</option>
                  <option value="الموارد البشرية">الموارد البشرية</option>
                  <option value="تقنية المعلومات">تقنية المعلومات</option>
                  <option value="المالية">المالية</option>
                  <option value="المبيعات">المبيعات</option>
                  <option value="العمليات">العمليات</option>
                </select>
              </div>

            </div>
          </div>

          <!-- Report Viewer Card -->
          <div class="card custom-table-card p-4">
            
            <!-- Standard Print Header (Hidden on screen, shown in prints) -->
            <div class="d-none d-print-block text-center border-bottom pb-3 mb-4">
              <h3 class="fw-bold m-0">مؤسسة الأعمال المبتكرة للحلول المتقدمة</h3>
              <p class="text-muted small m-0">نظام إدارة الموارد البشرية والحضور والرواتب الذكي</p>
              <h5 class="fw-bold mt-3 text-decoration-underline" id="print-header-title">تقرير كشف الموظفين</h5>
            </div>

            <!-- Dynamic Report Title (Screen representation) -->
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
              <h4 class="fw-bold m-0 text-dark d-flex align-items-center gap-2" id="report-viewer-title">
                <!-- Set dynamically from reports.js -->
              </h4>
              <span class="small text-muted d-print-none font-mono">تاريخ التوليد: 2026-06-22</span>
            </div>

            <hr class="mt-0 opacity-10">

            <!-- Data Table Grid -->
            <div class="table-responsive">
              <table class="table table-striped table-hover align-middle mb-0" id="report-table">
                <thead id="report-thead">
                  <!-- Generated headers load here dynamically -->
                </thead>
                <tbody id="report-tbody">
                  <!-- Filtered report rows load here dynamically -->
                </tbody>
              </table>
            </div>

          </div>

        </div>
      </div>
    </div>

    <!-- Script imports -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- App logics -->
    <script type="module" src="../js/storage.js"></script>
    <script type="module" src="../js/importExport.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/reports.js"></script>
  </body>
</html>
