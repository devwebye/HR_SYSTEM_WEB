<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شيت الحضور الشهري | نظام إدارة الحضور والانصراف والرواتب</title>
    <!-- CDN Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
    <link href="../css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Hidden element strictly telling the javascript router that this is the attendance page -->
    <div id="attendance-page-indicator" style="display:none"></div>

    <div class="app-wrapper">
      <!-- Dynamic Sidebar Container -->
      <div id="sidebar-container"></div>

      <!-- Main Action Wrapper -->
      <div class="main-content">
        <!-- Dynamic Header Container -->
        <div id="header-container"></div>

        <div class="content-body" style="overflow-x: hidden;">
          
          <!-- Page Header Info -->
          <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
              <h3 class="fw-bold m-0 text-dark">شيت الحضور والغياب الشهري</h3>
              <p class="text-muted m-0">شاشة تفاعلية ذكية شبيهة بـ Excel لإدخال ومراقبة مواعيد البصمات اليومية، الأعذار، وحساب الإحصائيات.</p>
            </div>
            
            <div class="d-flex gap-2 flex-wrap">
              <!-- Upload biometric stamps -->
              <div class="position-relative overflow-hidden">
                <button class="btn btn-outline-primary d-flex align-items-center gap-2">
                  <i class="bi bi-fingerprint"></i>
                  <span>استيراد ملف البصمات (إكسل)</span>
                </button>
                <input type="file" id="import-stamps-file" accept=".xlsx, .xls" class="position-absolute top-0 start-0 opacity-0 cursor-pointer h-100 w-100" />
              </div>

              <!-- Recalculate button trigger -->
              <button class="btn btn-warning d-flex align-items-center gap-2 fw-semibold" id="recalc-attendance">
                <i class="bi bi-cpu-fill"></i>
                <span>تحديث واحتساب البيانات</span>
              </button>
            </div>
          </div>

          <!-- Filter selection -->
          <div class="card p-3 custom-table-card mb-4 shadow-sm">
            <div class="row g-3 align-items-center justify-content-between">
              
              <!-- Left selection filters -->
              <div class="col-md-7 d-flex gap-3 align-items-center flex-wrap">
                <!-- Select month -->
                <div class="d-flex align-items-center gap-2">
                  <label class="form-label text-nowrap fw-semibold mb-0">الشهر:</label>
                  <select class="form-select shadow-none" id="select-month" style="width:120px">
                    <option value="01">يناير</option>
                    <option value="02">فبراير</option>
                    <option value="03">مارس</option>
                    <option value="04">أبريل</option>
                    <option value="05">مايو</option>
                    <option value="06">يونيو</option>
                    <option value="07">يوليو</option>
                    <option value="08">أغسطس</option>
                    <option value="09">سبتمبر</option>
                    <option value="10">أكتوبر</option>
                    <option value="11">نوفمبر</option>
                    <option value="12">ديسمبر</option>
                  </select>
                </div>

                <!-- Select Year -->
                <div class="d-flex align-items-center gap-2">
                  <label class="form-label text-nowrap fw-semibold mb-0">السنة:</label>
                  <select class="form-select shadow-none" id="select-year" style="width:100px">
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                  </select>
                </div>

                <!-- Select Department -->
                <div class="d-flex align-items-center gap-2 ms-2">
                  <label class="form-label text-nowrap fw-semibold mb-0">القسم:</label>
                  <select class="form-select shadow-none" id="filter-attendance-dept" style="width:180px">
                    <option value="">كل الأقسام</option>
                    <option value="الموارد البشرية">الموارد البشرية</option>
                    <option value="تقنية المعلومات">تقنية المعلومات</option>
                    <option value="المالية">المالية</option>
                    <option value="المبيعات">المبيعات</option>
                    <option value="العمليات">العمليات</option>
                  </select>
                </div>
              </div>

              <!-- Indicators guidance legends helpful for HR users -->
              <div class="col-md-5 text-start d-flex gap-2 justify-content-end flex-wrap small">
                <span class="badgeline px-2 py-1 rounded bg-secondary-subtle text-secondary border d-flex align-items-center gap-1">
                  <span class="rounded-circle bg-secondary d-inline-block" style="width:8px; height:8px;"></span>
                  <span>عطلة نهاية أسبوع</span>
                </span>
                <span class="badgeline px-2 py-1 rounded bg-danger-subtle text-danger border d-flex align-items-center gap-1">
                  <span class="rounded-circle bg-danger d-inline-block" style="width:8px; height:8px;"></span>
                  <span>غياب كامل</span>
                </span>
                <span class="badgeline px-2 py-1 rounded bg-amber-100 text-warning-emphasis border d-flex align-items-center gap-1" style="background:#fef3c7">
                  <span class="rounded-circle bg-warning d-inline-block" style="width:8px; height:8px;"></span>
                  <span>بصمة ناقصة</span>
                </span>
                <span class="badgeline px-2 py-1 rounded bg-primary-subtle text-primary border d-flex align-items-center gap-1">
                  <span class="rounded-circle bg-primary d-inline-block" style="width:8px; height:8px;"></span>
                  <span>إجازة مبررة</span>
                </span>
              </div>

            </div>
          </div>

          <!-- Batch Actions Panel -->
          <div id="batch-actions-panel" class="card p-3 mb-3 bg-light border d-none">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div class="d-flex align-items-center gap-3">
                <span class="fw-bold text-dark">العمليات الجماعية للبصمات:</span>
                <span id="selected-count-badge" class="badge bg-primary fs-6 py-2 px-3">محدد: 0 موظف</span>
              </div>
              <div class="d-flex gap-2">
                <button id="btn-select-all" class="btn btn-sm btn-outline-secondary">تحديد الكل</button>
                <button id="btn-deselect-all" class="btn btn-sm btn-outline-secondary">إلغاء التحديد</button>
                <button id="btn-delete-selected" class="btn btn-sm btn-danger">حذف بصمات الشهر للمحددين</button>
              </div>
            </div>
          </div>

          <!-- Dynamic Horizontal Excel Sheet Container -->
          <div class="card custom-table-card shadow-sm p-1">
            <div class="table-attendance-container">
              <table class="table-attendance table table-bordered mb-0">
                <thead>
                  <tr id="attendance-thead-days">
                    <!-- Loaded dynamically from attendance.js -->
                  </tr>
                  <tr id="attendance-thead-subheaders">
                    <!-- Sub-columns (CheckIn1, CheckOut1, CheckIn2, CheckOut2, Reason) -->
                  </tr>
                </thead>
                <tbody id="attendance-tbody">
                  <!-- Generated elements and input fields load here -->
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Script imports -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- App logics -->
    <script type="module" src="../js/storage.js"></script>
    <script type="module" src="../js/importExport.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/attendance.js"></script>
  </body>
</html>
